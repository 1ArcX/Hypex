<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Simacan login...</title>
<style>body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a1a;color:rgba(255,255,255,0.6);font-family:sans-serif;font-size:14px;}</style>
</head>
<body>
<span>Inloggen...</span>
<script>
  const params = new URLSearchParams(window.location.search)
  const hash   = new URLSearchParams(window.location.hash.slice(1))

  const code  = params.get('code')
  const error = params.get('error') || hash.get('error')
  const state = params.get('state')

  if (window.opener) {
    // Popup flow: stuur naar parent
    if (code)  window.opener.postMessage({ type: 'simacan_auth', code, state }, '*')
    if (error) window.opener.postMessage({ type: 'simacan_auth_error', error, description: params.get('error_description') }, '*')
    window.close()
  } else {
    // Redirect flow (mobiel): sla op in localStorage en ga terug
    if (code) {
      localStorage.setItem('simacan_pending_code', JSON.stringify({ code, state }))
    } else if (error) {
      localStorage.setItem('simacan_pending_error', params.get('error_description') || error)
    }
    window.location.href = '/'
  }
</script>
</body>
</html>
