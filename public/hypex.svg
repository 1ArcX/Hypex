<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Achtergrond -->
  <rect width="100" height="100" rx="22" fill="#0f0f0f"/>
  <!-- Hexagon outline (pointy-top, radius 36) -->
  <polygon
    points="50,14 81.2,32 81.2,68 50,86 18.8,68 18.8,32"
    fill="rgba(0,255,209,0.10)"
    stroke="#00FFD1"
    stroke-width="3.5"
    stroke-linejoin="round"
  />
  <!-- Letter "X" gecentreerd -->
  <text x="50" y="64"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
    font-size="38" font-weight="700" fill="#00FFD1"
    letter-spacing="-1">X</text>
</svg>
