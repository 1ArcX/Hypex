<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arrival Display</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body { margin: 0; }
  #map { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="map"></div>
<script>
var map = L.map('map').setView([52.70, 5.90], 8)

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap'
}).addTo(map)

var route = [
  [52.45,5.48],[52.51,5.75],[52.51,5.90],[52.52,6.10],[52.60,6.30],[52.72,6.47],
  [52.60,6.30],[52.52,6.10],[52.51,5.90],[52.67,5.64],[52.68,5.76],
  [52.90,5.81],[52.97,5.76],[53.00,5.68],[53.05,5.58],[53.12,5.52]
]
L.polyline(route, { color: '#333', weight: 4 }).addTo(map)

var stops = [
  [52.45,5.48],[52.51,5.90],[52.72,6.47],[52.52,6.10],[52.67,5.64],
  [52.68,5.76],[52.90,5.81],[52.97,5.76],[53.00,5.68],[53.05,5.58],[53.12,5.52]
]
stops.forEach(function(pos, i) {
  L.marker(pos, {
    icon: L.divIcon({
      html: '<div style="width:26px;height:26px;border-radius:50%;background:#fff;border:2px solid #333;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;font-family:Arial">'+(i+1)+'</div>',
      className: '', iconSize: [26,26], iconAnchor: [13,13]
    })
  }).addTo(map)
})

L.marker([52.60,6.20], {
  icon: L.divIcon({
    html: '<div style="width:36px;height:36px;border-radius:50%;background:#FFC72C;border:3px solid #333;display:flex;align-items:center;justify-content:center;font-size:18px">🚚</div>',
    className: '', iconSize: [36,36], iconAnchor: [18,18]
  })
}).addTo(map).bindPopup('Huidige positie').openPopup()
</script>
</body>
</html>
